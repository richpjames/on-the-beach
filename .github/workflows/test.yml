name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run unit tests
        run: bun run test:unit

  browser-checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ matrix.check != 'percy' || github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: e2e
            run_command: bun run test:e2e
            needs_percy_token: false
          - check: percy
            run_command: bunx @percy/cli exec -- bun run test:e2e:ui
            needs_percy_token: true
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --user root --ipc=host

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install unzip for Bun setup
        run: apt-get update && apt-get install -y unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright WebKit
        run: npx playwright install webkit

      - name: Setup database
        run: bun run db:migrate && bun run db:seed

      - name: Validate Percy token
        if: ${{ matrix.needs_percy_token }}
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: |
          if [ -z "$PERCY_TOKEN" ]; then
            echo "Missing PERCY_TOKEN GitHub Actions secret."
            exit 1
          fi

      - name: Run browser checks
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: ${{ matrix.run_command }}
