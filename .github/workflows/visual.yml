name: Visual Regression

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: visual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Run visual tests inside the official Playwright container (Linux/Chromium).
  # Baselines committed to the repo must be generated on the same platform
  # (Linux) to avoid cross-platform rendering differences causing false
  # positives. See README for instructions.
  # -------------------------------------------------------------------------
  visual-tests:
    name: Run visual tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --user root --ipc=host

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install unzip for Bun setup
        run: apt-get update && apt-get install -y unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup database
        run: bun run db:migrate && bun run db:seed

      - name: Run visual tests
        # continue-on-error so the report is always published, even on failure,
        # so reviewers can inspect the diff before deciding whether it is
        # intentional.
        continue-on-error: true
        run: bun run test:visual

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # -------------------------------------------------------------------------
  # Deploy the HTML report to the gh-pages branch so it is served over HTTP
  # (images in the Playwright report require HTTP to load). Uses a direct git
  # push rather than the Actions Pages API, which avoids the github-pages
  # environment protection rules that block PR branch deployments.
  #
  # Requires Pages source to be set to "Deploy from a branch → gh-pages" in
  # the repo settings (Settings → Pages → Source).
  #
  # Note: each deployment overwrites the previous one, so only the most
  # recently pushed PR's report is live at any time. The sticky comment on
  # each PR is updated in place.
  # -------------------------------------------------------------------------
  publish-report:
    name: Publish report
    needs: visual-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Deploy report to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: visual-report

      - name: Post sticky PR comment with report link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: visual-regression-report
          message: |
            ## Visual Regression Report

            The Playwright screenshot diff report for this PR has been published to GitHub Pages:

            **[View visual diff report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/visual-report/)**

            > Snapshots are compared against baselines committed to the repo.
            > If differences are intentional, update baselines locally on Linux
            > with `bun run test:visual:update` and commit the new snapshots.
            > See [README — Visual Regression Tests](../blob/main/README.md#visual-regression-tests) for details.
