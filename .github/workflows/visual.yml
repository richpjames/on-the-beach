name: Visual Regression

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: visual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Run visual tests inside the official Playwright container (Linux/Chromium).
  # Baselines committed to the repo must be generated on the same platform
  # (Linux) to avoid cross-platform rendering differences causing false
  # positives. See README for instructions.
  # -------------------------------------------------------------------------
  visual-tests:
    name: Run visual tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --user root --ipc=host

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install unzip for Bun setup
        run: apt-get update && apt-get install -y unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup database
        run: bun run db:migrate && bun run db:seed

      - name: Run visual tests
        run: bun run test:visual

      - name: Upload HTML report as Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: playwright-report/

  # -------------------------------------------------------------------------
  # Deploy the HTML report to GitHub Pages using the Actions Pages API (no
  # gh-pages branch required — configure Pages source as "GitHub Actions" in
  # the repo settings). Posts a sticky PR comment with a direct link to the
  # deployed report.
  #
  # Note: each deployment replaces the previous one, so only the most recently
  # pushed PR's report is live at any time. The sticky comment on each PR is
  # updated in place, so reviewers always see the current state of their PR.
  # -------------------------------------------------------------------------
  publish-report:
    name: Publish report
    needs: visual-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write
      pull-requests: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Post sticky PR comment with report link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: visual-regression-report
          message: |
            ## Visual Regression Report

            The Playwright screenshot diff report for this PR has been published to GitHub Pages:

            **[View visual diff report](${{ steps.deploy.outputs.page_url }})**

            > Snapshots are compared against baselines committed to the repo.
            > If differences are intentional, update baselines locally on Linux
            > with `bun run test:visual:update` and commit the new snapshots.
            > See [README — Visual Regression Tests](../blob/main/README.md#visual-regression-tests) for details.
